# Hyprlock Style 9

$wall = /home/ali/Pictures/wallpapers/winter-16.png
$profile = /home/ali/Pictures/wallpapers/profile.jpeg

# BACKGROUND
background {
    monitor =
    path = $wall
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono
    placeholder_text = <i><span foreground="##ffffff99">Enter Pass</span></i>
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 130
    font_family = JetBrains Mono
    position = 0, 240
    halign = center
    valign = center
}

# DAY-MONTH-DATE
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = JetBrains Mono
    position = 0, 105
    halign = center
    valign = center
}

# PROFILE PHOTO
image {
    monitor =
    path = $profile
    border_color = 0xffdddddd
    border_size = 0
    size = 120
    rounding = -1
    rotate = 0
    reload_time = -1
    position = 0, -20
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = JetBrains Mono
    position = 0, -130
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] /home/ali/.config/hyprlock/scripts/songdetail.sh
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 60
    halign = center
    valign = bottom
}
