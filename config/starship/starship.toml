# style_choices:
# bold
# italic
# underline
# dimmed
# inverted
# blink
# hidden
# strikethrough
# bg:<color>
# fg:<color>
# <color>
# none

#NOTE: you can customize the symbols, e.g:
# [character]
# success_symbol = "[ оҳӮ ]($bold fg:#f8f8f2)"
# error_symbol = "[ вһӨ ]($bold fg:#fb4934)"

[directory]
disabled = false
format = "[$path](bold fg:#8be9fd)"
truncate_to_repo = false
# home_symbol = "оҳ—" 

[git_branch]
format = " [ оӮ  $branch](fg:#9198a1)"

[git_status]
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
format = '[[(оӘ„ $all_status$ahead_behind )](fg:#769ff0)]($style)'
style = "bg:#394260"


[time]
disabled = false
format = '[[ пҗә $time ](fg:#a0a9cb )]($style)'
time_format = "%R"                            # Hour:Minute Format

[deno]
format = " [deno](italic) [оҙҚ ](green bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}]($style)"
style = "bold bright-yellow"
symbol = "вЁҖ "
version_format = "${raw}"

[nodejs]
detect_extensions = []
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
format = "[пўҳ ](bold bright-green)"
version_format = "${raw}"

[python]
format = "[${symbol}(${virtualenv}) ${version}]($style)"
style = "bold bright-yellow"
