# -------  KEYBINDINGS  -------
# Drop this into ~/.config/hypr/keybindings.conf
# and source it from hyprland.conf with: source = ~/.config/hypr/keybindings.conf

$mainMod = Super
$TERMINAL = kitty
$BROWSER = ~/.local/bin/zen-twilight
$MUSIC = spotify

# -------  Window Management  -------
bind = $mainMod, Q, killactive
bind = Alt, F4, killactive
bind = $mainMod, Delete, exit
bind = $mainMod, W, togglefloating
bind = $mainMod, G, togglegroup
bind = Shift, F11, fullscreen
bind = $mainMod, L, exec, hyprlock
bind = $mainMod Shift, F, pin
bind = Control Alt, Delete, exec, wlogout
bind = Alt_R, Control_R, exec, killall waybar || waybar

# Group Navigation
bind = $mainMod Control, H, changegroupactive, b
bind = $mainMod Control, L, changegroupactive, f

# Change Focus
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d
bind = ALT, Tab, cyclenext

# Resize Active Window
binde = $mainMod Shift, Right, resizeactive, 30 0
binde = $mainMod Shift, Left, resizeactive, -30 0
binde = $mainMod Shift, Up, resizeactive, 0 -30
binde = $mainMod Shift, Down, resizeactive, 0 30

# Move Active Window
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binde = $mainMod Shift Control, left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
binde = $mainMod Shift Control, right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
binde = $mainMod Shift Control, up, exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
binde = $mainMod Shift Control, down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# Move & Resize with Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

bind = $mainMod, J, togglesplit

# -------  Launchers  -------
bind = $mainMod, T, exec, $TERMINAL
bind = $mainMod Alt, T, exec, pypr toggle console
bind = $mainMod, B, exec, $BROWSER
bind = Control Shift, Escape, exec, $TERMINAL --class btop -e btop
bind = $mainMod, M, exec, $MUSIC

# Rofi
bind = $mainMod, A, exec, pkill -x rofi || rofi -show drun
bind = $mainMod, TAB, exec, pkill -x rofi || rofi -show window
bind = $mainMod Shift, E, exec, pkill -x rofi || rofi -show filebrowser
bind = $mainMod, V, exec, pkill -x rofi || cliphist list | rofi -dmenu | cliphist decode | wl-copy

# -------  Hardware Controls  -------
# Audio (wpctl via pipewire — already in your packages)
bindl  = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Brightness (brightnessctl is in nixpkgs)
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# -------  Utilities  -------
bindl = $mainMod, K, exec, hyprctl switchxkblayout all next

# Screenshots (hyprshot is already in your packages.nix)
bind = $mainMod Shift, P, exec, hyprpicker -an
bind = $mainMod, P, exec, hyprshot -m region
bind = $mainMod Control, P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod Alt, P, exec, hyprshot -m output
bind = , Print, exec, hyprshot -m output

# -------  Workspaces  -------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod Control, Right, workspace, r+1
bind = $mainMod Control, Left, workspace, r-1
bind = $mainMod Control, Down, workspace, empty

# Move Window to Workspace
bind = $mainMod Shift, 1, movetoworkspace, 1
bind = $mainMod Shift, 2, movetoworkspace, 2
bind = $mainMod Shift, 3, movetoworkspace, 3
bind = $mainMod Shift, 4, movetoworkspace, 4
bind = $mainMod Shift, 5, movetoworkspace, 5
bind = $mainMod Shift, 6, movetoworkspace, 6
bind = $mainMod Shift, 7, movetoworkspace, 7
bind = $mainMod Shift, 8, movetoworkspace, 8
bind = $mainMod Shift, 9, movetoworkspace, 9
bind = $mainMod Shift, 0, movetoworkspace, 10

bind = $mainMod Control Alt, Right, movetoworkspace, r+1
bind = $mainMod Control Alt, Left, movetoworkspace, r-1

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad
bind = $mainMod Shift, S, movetoworkspace, special
bind = $mainMod Alt, S, movetoworkspacesilent, special
bind = $mainMod, S, togglespecialworkspace

# Move Window to Workspace Silently
bind = $mainMod Alt, 1, movetoworkspacesilent, 1
bind = $mainMod Alt, 2, movetoworkspacesilent, 2
bind = $mainMod Alt, 3, movetoworkspacesilent, 3
bind = $mainMod Alt, 4, movetoworkspacesilent, 4
bind = $mainMod Alt, 5, movetoworkspacesilent, 5
bind = $mainMod Alt, 6, movetoworkspacesilent, 6
bind = $mainMod Alt, 7, movetoworkspacesilent, 7
bind = $mainMod Alt, 8, movetoworkspacesilent, 8
bind = $mainMod Alt, 9, movetoworkspacesilent, 9
bind = $mainMod Alt, 0, movetoworkspacesilent, 10
