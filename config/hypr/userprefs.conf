# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# Rose Pine Hyprcursor theme
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,rose-pine-hyprcursor
env = XCURSOR_SIZE,24

exec-once = hyprctl setcursor rose-pine-hyprcursor 24

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░

$gestureFingers = 3
#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,tr
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # 🔗 See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = yes
    }

}


# Special workspaces
workspace = special:spotify, on-created-empty:spotify
workspace = special:terminal, on-created-empty:kitty

# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
 #   vfr = false
  #  explicit-spawn = true
}

# Bind 3-finger swipe down to lock screen
gesture = 3, down, dispatcher, exec, hyprlock

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}


